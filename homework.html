<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<style>
    .span{
        min-height: 200px;
    }
    .header{
        min-height: 80px;
    }
    .nav{
        min-height: 80px;
    }
    .slidebar{
        min-height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .content{
        min-height: 300px;
        display: flex;
        justify-content: center;
        align-items: center; 
        padding: 20px;
    }
    .footer{
        min-height: 80px;
    }
</style>
<body>
    <div class="container flex-column gap-2 text-center">
        <div class="row d-flex justify-content-center align-items-center h1 bg-success">
            <div class="header col-1 bg-success d-flex justify-content-center align-items-center">
                <header>Header</header>
            </div>
        </div>
        <div class="row d-flex justify-content-center align-items-center h1 bg-primary">
            <div class="nav col-1 bg-primary d-flex justify-content-center align-items-center">
                <nav>Nav</nav>
            </div>
        </div>
        <div class="row h1 span text-center ">
        <div class="slidebar col-3 bg-warning ">
            <span>Slidebar</span> 
        </div>
        <div class="col-1"></div>
        <div class="content col-8 bg-info">
            <span>Content</span>
        </div>
        </div>
        <div class="row d-flex justify-content-center align-items-center h1 bg-primary">
            <div class="footer col-1 bg-primary d-flex justify-content-center align-items-center">
                <footer>Footer</footer>
            </div>
        </div>
    </div>
</body>
<script scr="js/bootstrap.js"></script>
</html>
