<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        .header,
        .nav,
        .footer {
            min-height: 80px;
        }

        .sidebar,
        .content {
            min-height: 300px;
        }

        .header,
        .nav,
        .footer,
        .sidebar,
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container mt-3">

        <!-- Header -->
        <div class="row mb-2">
            <div class="col-12 header bg-success text-white">
                Header
            </div>
        </div>

        <!-- Navigation -->
        <div class="row mb-2">
            <div class="col-12 nav bg-primary text-white">
                Navigation
            </div>
        </div>

        <!-- Main Content -->
        <div class="row mb-2">

            <!-- Sidebar -->
            <div class="col-md-3 col-12">
                <div class="sidebar bg-warning">
                    Sidebar
                </div>
            </div>

            <!-- Content -->
            <div class="col-md-9 col-12">
                <div class="content bg-info text-white">
                    Content
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="row">
            <div class="col-12 footer bg-dark text-white">
                Footer
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.js"></script>

</body>
</html>
